name: my_app
description: "A cross-platform todo application with Flutter and Node.js backend."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  dio: ^5.9.2
  flutter_riverpod: ^3.2.1
  shared_preferences: ^2.5.4
  http: ^1.6.0
  riverpod: ^3.2.1
  riverpod_generator: ^4.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.12.2

flutter:
  uses-material-design: true
  assets:
    - assets/images/
